name: Branch Check

on:
  push:
    branches:
      - main

jobs:
  check-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check commit type
        id: check-commit
        run: |
          # ボットかどうかチェック
          if [[ "${{ github.actor }}" == *"[bot]"* ]] || [[ "${{ github.actor }}" == "github-actions"* ]]; then
            echo "is_bot=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # マージコミットかどうかチェック
          if git rev-parse -q --verify HEAD^2 > /dev/null; then
            echo "is_merge=true" >> $GITHUB_OUTPUT
          else
            echo "is_merge=false" >> $GITHUB_OUTPUT
          fi

      - name: Warn on direct commit to main
        if: steps.check-commit.outputs.is_bot != 'true' && steps.check-commit.outputs.is_merge != 'true'
        run: |
          echo "⚠️  mainブランチで直接コミットしています（develop経由のマージを推奨）"
          echo "警告のみ — ワークフローは続行します"
