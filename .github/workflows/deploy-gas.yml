name: Deploy GAS via clasp

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'gas/listing/standalone/**'
      - 'gas/listing/container/**'
      - 'gas/research/standalone/**'
      - 'gas/research/container/**'
      - 'gas/research/bind/**'
      - 'gas/ebay-db/container/**'
      - 'gas/ebay-db/bind/**'

jobs:
  deploy-listing-standalone:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Restore clasp credentials
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Set scriptId and deploy
        run: |
          cd gas/listing/standalone
          if [ "${{ github.ref_name }}" = "main" ]; then
            SCRIPT_ID="${{ secrets.LISTING_SA_PROD }}"
          else
            SCRIPT_ID="${{ secrets.LISTING_SA_DEV }}"
          fi
          sed -i "s/REPLACED_BY_CI/$SCRIPT_ID/" .clasp.json
          clasp push --force

  deploy-listing-container:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Restore clasp credentials
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Set scriptId and deploy
        run: |
          cd gas/listing/container
          if [ "${{ github.ref_name }}" = "main" ]; then
            SCRIPT_ID="${{ secrets.LISTING_CB_PROD }}"
          else
            SCRIPT_ID="${{ secrets.LISTING_CB_DEV }}"
          fi
          sed -i "s/REPLACED_BY_CI/$SCRIPT_ID/" .clasp.json
          clasp push --force

  deploy-research-standalone:
    runs-on: ubuntu-latest
    # RESEARCH_SA_PROD / RESEARCH_SA_DEV を GitHub Secrets に追加後に有効になる
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Restore clasp credentials
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Set scriptId and deploy
        run: |
          cd gas/research/standalone
          if [ "${{ github.ref_name }}" = "main" ]; then
            SCRIPT_ID="${{ secrets.RESEARCH_SA_PROD }}"
          else
            SCRIPT_ID="${{ secrets.RESEARCH_SA_DEV }}"
          fi
          if [ -z "$SCRIPT_ID" ]; then
            echo "⚠️ SCRIPT_ID が未設定のためスキップ（RESEARCH_SA_PROD/DEV シークレットを確認してください）"
            exit 0
          fi
          sed -i "s/REPLACED_BY_CI/$SCRIPT_ID/" .clasp.json
          clasp push --force

  deploy-research-bind:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Restore clasp credentials
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Set scriptId and deploy
        run: |
          cd gas/research/bind
          if [ "${{ github.ref_name }}" = "main" ]; then
            SCRIPT_ID="${{ secrets.RESEARCH_BIND_PROD }}"
            SA_SCRIPT_ID="${{ secrets.RESEARCH_SA_PROD }}"
          else
            SCRIPT_ID="${{ secrets.RESEARCH_BIND_DEV }}"
            SA_SCRIPT_ID="${{ secrets.RESEARCH_SA_DEV }}"
          fi
          if [ -z "$SCRIPT_ID" ]; then
            echo "⚠️ SCRIPT_ID が未設定のためスキップ（RESEARCH_BIND_PROD/DEV シークレットを確認してください）"
            exit 0
          fi
          sed -i "s/REPLACED_BY_CI/$SCRIPT_ID/" .clasp.json
          sed -i "s/RESEARCH_SA_SCRIPT_ID/$SA_SCRIPT_ID/" appsscript.json
          clasp push --force

  deploy-research-container:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Restore clasp credentials
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Set scriptId and deploy
        run: |
          cd gas/research/container
          if [ "${{ github.ref_name }}" = "main" ]; then
            SCRIPT_ID="${{ secrets.RESEARCH_CB_PROD }}"
          else
            SCRIPT_ID="${{ secrets.RESEARCH_CB_DEV }}"
          fi
          sed -i "s/REPLACED_BY_CI/$SCRIPT_ID/" .clasp.json
          clasp push --force

  deploy-ebay-db-bind:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Restore clasp credentials
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Set scriptId and deploy
        run: |
          cd gas/ebay-db/bind
          if [ "${{ github.ref_name }}" = "main" ]; then
            SCRIPT_ID="${{ secrets.EBAY_DB_BIND_PROD }}"
            SA_SCRIPT_ID="${{ secrets.LISTING_SA_PROD }}"
          else
            SCRIPT_ID="${{ secrets.EBAY_DB_BIND_DEV }}"
            SA_SCRIPT_ID="${{ secrets.LISTING_SA_DEV }}"
          fi
          if [ -z "$SCRIPT_ID" ]; then
            echo "⚠️ SCRIPT_ID が未設定のためスキップ（EBAY_DB_BIND_PROD/DEV シークレットを確認してください）"
            exit 0
          fi
          sed -i "s/REPLACED_BY_CI/$SCRIPT_ID/" .clasp.json
          sed -i "s/LISTING_SA_SCRIPT_ID/$SA_SCRIPT_ID/" appsscript.json
          clasp push --force

      - name: Test clasp run (diagnostic)
        if: github.ref_name == 'develop'
        continue-on-error: true
        run: |
          cd gas/ebay-db/bind
          SCRIPT_ID="${{ secrets.EBAY_DB_BIND_DEV }}"
          sed -i "s/REPLACED_BY_CI/$SCRIPT_ID/" .clasp.json
          echo "--- testClaspRun ---"
          clasp run testClaspRun
          echo "--- authorizeDBScript ---"
          clasp run authorizeDBScript

  deploy-ebay-db-container:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Restore clasp credentials
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Set scriptId and deploy
        run: |
          cd gas/ebay-db/container
          SCRIPT_ID="${{ secrets.EBAY_DB_CB_DEV }}"
          SA_SCRIPT_ID="${{ secrets.LISTING_SA_DEV }}"
          sed -i "s/REPLACED_BY_CI/$SCRIPT_ID/" .clasp.json
          sed -i "s/LISTING_SA_SCRIPT_ID/$SA_SCRIPT_ID/" appsscript.json
          clasp push --force

      - name: Register handleEditDB trigger on eBay出品DB
        run: |
          cd gas/ebay-db/container
          OUTPUT=$(clasp run registerHandleEditTrigger 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "Exception"; then
            echo "❌ registerHandleEditTrigger failed. Authorize script.scriptapp scope in GAS editor first."
            exit 1
          fi
          echo "✅ registerHandleEditTrigger succeeded"

      - name: Import condition_ja_map and sync to reference book
        run: |
          cd gas/ebay-db/container
          clasp run importConditionJaMap
