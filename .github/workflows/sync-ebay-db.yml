name: Sync eBay DB (Monthly)

on:
  schedule:
    - cron: '0 3 1 * *'   # 毎月1日 03:00 UTC（日本時間 12:00）
  workflow_dispatch:        # 手動実行

jobs:
  sync-ebay-db:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      OUTPUT_DIR: ${{ github.workspace }}/ebay-db/output

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create output directory
        run: mkdir -p ${{ env.OUTPUT_DIR }}

      # ─── Python セットアップ ───────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r ebay-db/scripts/requirements.txt

      # ─── Step1: eBay カテゴリスペック取得 ─────────────────
      - name: Step1 - Fetch category aspects (fetchItemAspects)
        env:
          EBAY_CLIENT_ID:     ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          OUTPUT_DIR:         ${{ env.OUTPUT_DIR }}
        run: python ebay-db/scripts/fetch_category_master.py

      # ─── Step2: eBay コンディション取得 ───────────────────
      - name: Step2 - Fetch item condition policies
        env:
          EBAY_CLIENT_ID:     ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          OUTPUT_DIR:         ${{ env.OUTPUT_DIR }}
        run: python ebay-db/scripts/fetch_conditions.py

      # ─── Step3: FVFレート抽出（Gemini） ───────────────────
      - name: Step3 - Extract FVF rates via Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OUTPUT_DIR:     ${{ env.OUTPUT_DIR }}
        run: python ebay-db/scripts/extract_fvf.py

      # ─── Step4: CSV 生成 ───────────────────────────────────
      - name: Step4 - Generate CSV files
        env:
          OUTPUT_DIR: ${{ env.OUTPUT_DIR }}
        run: python ebay-db/scripts/generate_csv.py

      # ─── Step5: CSV をリポジトリにコミット ────────────────
      - name: Step5 - Commit CSVs to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ebay-db/output/category_master.csv ebay-db/output/condition_ja_map.csv
          if git diff --staged --quiet; then
            echo "CSVに変更なし。コミットをスキップ"
          else
            git commit -m "data: ebay-db CSV 月次更新 $(date -u '+%Y-%m-%d')"
            git push
          fi

      # ─── clasp セットアップ ────────────────────────────────
      - name: Setup Node.js for clasp
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Restore clasp credentials
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Set scriptId for ebay-db/container
        run: |
          cd gas/ebay-db/container
          sed -i "s/REPLACED_BY_CI/${{ secrets.EBAY_DB_CB_DEV }}/" .clasp.json

      # ─── Step6: GAS importAndSync 実行 ────────────────────
      - name: Step6 - Run GAS importAndSync (import / validate / transfer)
        working-directory: gas/ebay-db/container
        run: clasp run importAndSync

      - name: Notify failure to Discord
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_AUDIT }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"🚨 ebay-db 月次同期 GitHub Actions FAILED\\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
